<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MealCare — Home</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --text: #1a1d21;
      --muted: #5c6370;
      --accent: #2d6a4f;
      --accent-hover: #1b4332;
      --border: #e2e5eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      font-size: 18px;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
    }
    .wrap {
      max-width: 40rem;
      margin: 0 auto;
      padding: 1rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.35rem 1.25rem;
    }
    h1 {
      font-size: 1.65rem;
      font-weight: 700;
      margin: 0 0 0.5rem;
    }
    p { margin: 0 0 1rem; color: var(--text); }
    .lead { color: var(--muted); font-size: 1.125rem; margin-bottom: 1.1rem; }
    .actions { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
    .cta {
      display: inline-block;
      background: var(--accent);
      color: #fff !important;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.05rem;
      padding: 0.65rem 1.2rem;
      border-radius: 8px;
    }
    .cta:hover, .cta:focus { background: var(--accent-hover); outline: 2px solid var(--accent); outline-offset: 2px; }
    .hint {
      margin-top: 1rem;
      font-size: 1rem;
      color: var(--muted);
    }
    .hint a { color: var(--accent); font-weight: 600; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>MealCare</h1>
      <p class="lead">
        Meal planning for older adults and caregivers. Open the web app to plan meals, view your plan, manage your shopping list, and update your profile.
      </p>
      <div class="actions">
        <a class="cta" href="https://meal-planner-for-elderly.vercel.app/" target="_blank" rel="noopener noreferrer">Open MealCare</a>
      </div>
      <p class="hint">
        For step-by-step help, system requirements, and FAQs, use the <strong>User guide</strong> page in this site’s navigation (menu or sidebar).
      </p>
    </div>
  </div>
</body>
</html>
